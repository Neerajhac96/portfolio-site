<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail | Niraj Kumar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Reuse main stylesheet for variables + base styles -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="project-detail.css" />
  </head>
  <body>
    <!-- Minimal navbar -->
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">NK<span class="accent">.</span></a>
        <div class="nav-actions">
          <a href="index.html#projects" class="btn btn-outline btn-sm">
            <i class="fa-solid fa-arrow-left"></i> Back to Projects
          </a>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Content injected by project-detail.js -->
    <main class="detail-main" id="detailMain">
      <!-- Loading state -->
      <div class="detail-loading" id="detailLoading">
        <div class="loading-spinner"></div>
        <p>Loading project...</p>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="footer-copy">© 2024 Niraj Kumar. All rights reserved.</p>
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="project-detail.js"></script>
  </body>
</html>
